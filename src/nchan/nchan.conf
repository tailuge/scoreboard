server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Shared CORS configuration using native Nchan directives
    # Broad access for public pub/sub endpoints
    nchan_access_control_allow_origin "*";
    nchan_access_control_allow_credentials off; # Not required for public access

    # Data Enrichment: Expose useful metadata via response headers
    # Nchan does not natively support message body mutation without complex upstreams,
    # but providing headers for publishers and subscribers is very efficient.
    add_header X-Server-Time $time_iso8601 always;
    add_header X-User-Agent $http_user_agent always;
    add_header X-Origin $http_origin always;
    add_header X-Client-Country $http_cf_ipcountry always; # In Render/Cloudflare environments
    add_header Vary Origin always;

    # Publisher endpoint table
    location ~ ^/publish/table/(?<channel>\w+)$ {
        nchan_publisher;
        nchan_channel_id $channel;
        nchan_message_buffer_length 2000;
        default_type application/json;
    }

    # Publisher endpoint lobby
    location ~ ^/publish/lobby/(?<channel>\w+)$ {
        nchan_publisher;
        nchan_channel_id $channel;
        nchan_message_buffer_length 0;
        default_type application/json;
    }

    # Subscriber endpoint table
    location ~ ^/subscribe/table/(?<channel>\w+)$ {
        nchan_subscriber;
        nchan_channel_id $channel;

        nchan_message_buffer_length 0;
        nchan_message_timeout 0;
        nchan_subscriber_first_message oldest;
        nchan_subscriber_timeout 0;
    }

    # Subscriber endpoint lobby
    location ~ ^/subscribe/lobby/(?<channel>\w+)$ {
        nchan_subscriber;
        nchan_channel_id $channel;

        nchan_message_buffer_length 0;
        nchan_message_timeout 0;
        nchan_subscriber_timeout 0;
    }

    # Publisher endpoint presence
    location ~ ^/publish/presence/(?<channel>\w+)$ {
        nchan_publisher;
        nchan_channel_id $channel;

        nchan_message_buffer_length 2000;
        nchan_message_timeout 90s;
        default_type application/json;
    }

    # Subscriber endpoint presence
    location ~ ^/subscribe/presence/(?<channel>\w+)$ {
        nchan_subscriber;
        nchan_channel_id $channel;

        nchan_message_buffer_length 2000;
        nchan_message_timeout 90s;
        nchan_subscriber_first_message oldest;
        nchan_subscriber_timeout 0;
    }

    # Basic status monitoring
    location = /basic_status {
        stub_status;

        # Add manual CORS headers as native Nchan CORS doesn't apply to stub_status
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        # Preflight request handling
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Extended stats
    location /nchan_stats {
        nchan_stub_status;

        # Add manual CORS headers as native Nchan CORS doesn't apply to nchan_stub_status
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        # Preflight request handling
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Serve static files (index.html)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }
}
