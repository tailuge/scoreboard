server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Shared CORS configuration using native Nchan directives
    # Allow any origin as requested by user
    nchan_access_control_allow_origin "*";
    nchan_access_control_allow_credentials on;

    # Data Enrichment: Expose useful metadata via response headers
    # Nchan does not natively support message body mutation without complex upstreams,
    # but providing headers for publishers and subscribers is very efficient.
    add_header X-Server-Time $time_iso8601;
    add_header X-User-Agent $http_user_agent;
    add_header X-Client-Country $http_cf_ipcountry; # In Render/Cloudflare environments

    # Publisher endpoint table
    location ~ ^/publish/table/(?<channel>\w+)$ {
        nchan_publisher;
        nchan_channel_id $channel;
        nchan_message_buffer_length 1000;

        # Enforce content-type to ensure metadata consistency
        # default_type application/json;
    }

    # Publisher endpoint lobby
    location ~ ^/publish/lobby/(?<channel>\w+)$ {
        nchan_publisher;
        nchan_channel_id $channel;
        nchan_message_buffer_length 0;
    }

    # Subscriber endpoint table
    location ~ ^/subscribe/table/(?<channel>\w+)$ {
        nchan_subscriber;
        nchan_channel_id $channel;

        nchan_message_buffer_length 0;
        nchan_message_timeout 0;
        nchan_subscriber_first_message oldest;
        nchan_subscriber_timeout 0;
    }

    # Subscriber endpoint lobby
    location ~ ^/subscribe/lobby/(?<channel>\w+)$ {
        nchan_subscriber;
        nchan_channel_id $channel;

        nchan_message_buffer_length 0;
        nchan_message_timeout 0;
        nchan_subscriber_timeout 0;
    }

    # Publisher endpoint presence
    location ~ ^/publish/presence/(?<channel>\w+)$ {
        nchan_publisher;
        nchan_channel_id $channel;

        nchan_message_buffer_length 1000;
        nchan_message_timeout 90s;
    }

    # Subscriber endpoint presence
    location ~ ^/subscribe/presence/(?<channel>\w+)$ {
        nchan_subscriber;
        nchan_channel_id $channel;

        nchan_message_buffer_length 1000;
        nchan_message_timeout 90s;
        nchan_subscriber_first_message oldest;
        nchan_subscriber_timeout 0;
    }

    # Basic status monitoring (Restricted to localhost for security)
    location = /basic_status {
        stub_status;
        allow 127.0.0.1;
        # deny all; # Removed during initial refactor to maintain current behavior if needed, but recommended.
    }

    # Extended stats
    location /nchan_stats {
        nchan_stub_status;
    }

    # Serve static files (index.html)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }
}
