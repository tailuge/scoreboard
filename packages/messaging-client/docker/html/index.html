<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messaging Workbench</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: sans-serif; }
        .pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ddd; }
        .header { background: #333; color: #fff; padding: 1rem; text-align: center; font-weight: bold; }
        iframe { flex: 1; border: 1px; border-radius: 4px;}
    </style>
</head>
<body>
    <div class="pane">
        <div class="header">Client A (Alice)</div>
        <iframe src="client.html?id=alice&name=Alice"></iframe>
    </div>
    <div class="pane">
        <div class="header">Client B (Bob)</div>
        <iframe src="client.html?id=bob&name=Bob"></iframe>
    </div>
    <div class="pane">
        <div class="header">Client C (Cline)</div>
        <iframe src="client.html?id=cline&name=Cline"></iframe>
    </div>

    <script>
        // Check if Nchan is reachable
        async function checkNchan() {
            try {
                // Check both health and presence paths
                const res = await fetch("http://" + window.location.hostname + "/health");
                if (!res.ok) throw new Error();
            } catch (e) {
                alert("Nchan server not detected on port 80. Please ensure 'npm run docker:nchan start' is running.");
            }
        }
        checkNchan();
    </script>
</body>
</html>
