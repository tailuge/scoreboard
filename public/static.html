<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billiards Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo:wght@200&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            background: linear-gradient(
                to bottom,
                #1a1a1a 0%,
                #0f0f0f 100%
            );
            background-attachment: fixed;        
            color: var(--text-main);
            font-family: 'Exo', sans-serif;
            font-weight: 200;
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            text-align: center;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        .item:hover { transform: translateY(-2px); }
        .item:active { transform: scale(0.95); }

        .pixelated {
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            background-color: var(--card-bg);
            margin-bottom: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            transition: filter 0.2s;
        }
        .item:hover .icon-box { filter: brightness(1.2); }

        .icon-box img { 
            display: none; 
        }

        .label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        /* Naming Convention Fallbacks */
        .fallback-eightball { --b64: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAMAAACeL25MAAAADFBMVEVRUmpjY299fH43OFUfkNl3AAAAE0lEQVQI12NgYGQAAiYwycwMxgAAggARzYDVGQAAAABJRU5ErkJggg=="); }
        .fallback-nineball { --b64: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAMAAACeL25MAAAAElBMVEVmeUehpGhjdjiGjDDYzInLt2lo5X8EAAAAGklEQVQI12NgYGRkYmBmYWVmYGYFspgYGJgAAXIAI3Y2z5oAAAAASUVORK5CYII="); }
        .fallback-practice { --b64: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAMAAACeL25MAAAADFBMVEVoTGt7XoSGa4uumKgOwfDTAAAAF0lEQVQI12NgYGRiZGBkZmYCEkwMYAAAAPYAFO3iCuMAAAAASUVORK5CYII="); }
        .fallback-snooker { --b64: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAMAAACeL25MAAAAD1BMVEVKc0JRdEluLR87YjNQYDV1yIxOAAAAGklEQVQI1wXBAQEAAAiDMIT3z+wGd4DGdFA9APYAHwtdltcAAAAASUVORK5CYII="); }
        .fallback-threecushion { --b64: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAMAAACeL25MAAAADFBMVEVbWG9kZohna5VXPlOdujwnAAAAFklEQVQI12NgYGRkYGBkAhJgFhAwAwAAfQAMlQzpOgAAAABJRU5ErkJggg=="); }

        .is-fallback { 
            background-image: var(--b64) !important; 
        }
    </style>
    <script>
        function handleImageError(img) {
            const name = img.getAttribute('src').split('/').pop().split('.')[0];
            const parent = img.parentElement;
            parent.classList.add(`fallback-${name}`, 'is-fallback');
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Billiards</h1>
        
        <div class="grid">
            <div class="item">
                <div class="icon-box pixelated" style="background-image: url('assets/eightball.png')">
                    <img src="assets/eightball.png" onerror="handleImageError(this)">
                </div>
                <div class="label">8-Ball</div>
            </div>

            <div class="item">
                <div class="icon-box pixelated" style="background-image: url('assets/nineball.png')">
                    <img src="assets/nineball.png" onerror="handleImageError(this)">
                </div>
                <div class="label">9-Ball</div>
            </div>

            <div class="item">
                <div class="icon-box pixelated" style="background-image: url('assets/practice.png')">
                    <img src="assets/practice.png" onerror="handleImageError(this)">
                </div>
                <div class="label">Practice</div>
            </div>

            <div class="item">
                <div class="icon-box pixelated" style="background-image: url('assets/snooker.png')">
                    <img src="assets/snooker.png" onerror="handleImageError(this)">
                </div>
                <div class="label">Snooker</div>
            </div>

            <div class="item">
                <div class="icon-box pixelated" style="background-image: url('assets/threecushion.png')">
                    <img src="assets/threecushion.png" onerror="handleImageError(this)">
                </div>
                <div class="label">3-Cushion</div>
            </div>
        </div>
    </div>
</body>
</html>
