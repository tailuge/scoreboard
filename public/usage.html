<!doctype html>
<html lang="en">
  <head>
    <title>Support Terminal: Usage</title>
    <link rel="icon" type="image/png" href="golden-cup.png" />
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="description" content="A dashboard for monitoring usage metrics." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        background-color: #000;
        color: #fff;
        font-family: "IBM Plex Mono", monospace;
        margin: 0;
        padding: 20px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
      }
      .title {
        font-size: 1.5rem;
        margin: 0;
      }
      .server-stats-links a {
        color: #0055ff;
        text-decoration: none;
        margin-left: 20px;
        font-size: 0.8rem;
      }
      .chart-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
      }
      .chart-container {
        background-color: #111;
        border: 1px solid #333;
        padding: 10px;
        height: 400px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1 class="title">USAGE</h1>
      <div class="server-stats-links">
        <a href="https://vercel.com/tailuges-projects/~/usage" target="_blank"
          >VERCEL</a
        >
        <a
          href="https://dashboard.render.com/web/srv-ctk5bmtds78s73eteil0/metrics"
          target="_blank"
          >RENDER</a
        >
      </div>
    </header>
    <main id="chart-grid" class="chart-grid"></main>

    <script
      src="https://cdn.plot.ly/plotly-cartesian-3.0.0-rc.0.min.js"
      integrity="sha384-k9BNvphELWyBtQVTUBS5YYM9SAb3H4NoA6hxg6YARuWJqdp+yp8F3mJN405LN+KC"
      crossorigin="anonymous"
    ></script>

    <script type="module">
      const GROUPS = [
        {
          id: "lobby-game",
          label: "LOBBY & GAME ACTIVITY",
          metrics: [
            { id: "lobby", label: "LOBBY TRAFFIC", color: "#0055ff" },
            { id: "game", label: "GAME ACTIVITY", color: "#9c27b0" },
          ],
        },
        {
          id: "challenges-accepts",
          label: "CHALLENGES & ACCEPTS",
          metrics: [
            { id: "createTable", label: "CHALLENGES", color: "#ff3e00" },
            { id: "joinTable", label: "ACCEPTS", color: "#4caf50" },
          ],
        },
      ]

      const chartGrid = document.getElementById("chart-grid")

      GROUPS.forEach((group) => {
        const container = document.createElement("div")
        container.id = group.id
        container.className = "chart-container"
        chartGrid.appendChild(container)
        plotGroup(group)
      })

      async function getData(url) {
        const response = await fetch(url)
        return response.json()
      }

      async function plotGroup(groupConfig) {
        const traces = await Promise.all(
          groupConfig.metrics.map(async (metric) => {
            const url = `/api/usage/${metric.id}`
            const rawData = await getData(url)
            const data = []

            for (let i = 0; i < rawData.length; i += 2) {
              data.push({ date: rawData[i].date, clicks: rawData[i + 1] })
            }

            data.sort((a, b) => new Date(a.date) - new Date(b.date))

            return {
              x: data.map((d) => d.date),
              y: data.map((d) => d.clicks),
              name: metric.label,
              type: "scatter",
              mode: "lines",
              line: { color: metric.color, width: 2 },
            }
          })
        )

        const layout = {
          title: {
            text: groupConfig.label,
            font: {
              family: "'IBM Plex Mono', monospace",
              size: 11,
              color: "#888",
            },
            x: 0,
            xanchor: "left",
          },
          xaxis: {
            type: "date",
            tickangle: 0,
            dtick: "M3",
            tickformat: "%b %Y",
            gridcolor: "#333",
            linecolor: "#333",
            tickfont: {
              family: "'DM Sans', sans-serif",
              size: 9,
              color: "#999",
            },
            zeroline: false,
          },
          yaxis: {
            gridcolor: "#333",
            linecolor: "#333",
            tickfont: {
              family: "'DM Sans', sans-serif",
              size: 9,
              color: "#999",
            },
            zeroline: false,
          },
          legend: {
            font: {
              family: "'DM Sans', sans-serif",
              size: 9,
              color: "#999",
            },
            bgcolor: "rgba(0,0,0,0)",
          },
          plot_bgcolor: "rgba(0,0,0,0)",
          paper_bgcolor: "rgba(0,0,0,0)",
          margin: { t: 50, r: 20, b: 40, l: 30 },
          autosize: true,
        }

        const config = {
          responsive: true,
          displayModeBar: false,
          staticPlot: false,
        }

        Plotly.newPlot(groupConfig.id, traces, layout, config)
      }
    </script>
  </body>
</html>
