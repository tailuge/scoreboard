<!doctype html>
<html lang="en">
  <head>
    <title>Support Terminal: Usage</title>
    <link rel="icon" type="image/png" href="golden-cup.png" />
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta
      name="description"
      content="A TUI-inspired dashboard for monitoring usage metrics."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="usage.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">SUPPORT TERMINAL: USAGE</h1>
      <div class="server-stats-links">
        <a href="https://vercel.com/tailuges-projects/~/usage" target="_blank"
          >VERCEL</a
        >
        <a
          href="https://dashboard.render.com/web/srv-ctk5bmtds78s73eteil0/metrics"
          target="_blank"
          >RENDER</a
        >
      </div>
    </header>
    <main id="chart-grid" class="chart-grid"></main>

    <script
      src="https://cdn.plot.ly/plotly-cartesian-3.0.0-rc.0.min.js"
      integrity="sha384-k9BNvphELWyBtQVTUBS5YYM9SAb3H4NoA6hxg6YARuWJqdp+yp8F3mJN405LN+KC"
      crossorigin="anonymous"
    ></script>

    <script type="module">
      const METRICS = [
        { id: "lobby", label: "LOBBY TRAFFIC", color: "#0055ff" },
        { id: "createTable", label: "TABLE CREATION", color: "#ff3e00" },
        { id: "joinTable", label: "TABLE JOINS", color: "#4caf50" },
        { id: "game", label: "GAME ACTIVITY", color: "#9c27b0" },
      ]

      const chartGrid = document.getElementById("chart-grid")

      METRICS.forEach((metric) => {
        const container = document.createElement("div")
        container.id = metric.id
        container.className = "chart-container"
        chartGrid.appendChild(container)
        plotMetric(metric)
      })

      async function getData(url) {
        const response = await fetch(url)
        return response.json()
      }

      async function plotMetric(metricConfig) {
        const url = `/api/usage/${metricConfig.id}`
        const rawData = await getData(url)
        const data = []

        for (let i = 0; i < rawData.length; i += 2) {
          data.push({ date: rawData[i].date, clicks: rawData[i + 1] })
        }

        data.sort((a, b) => new Date(a.date) - new Date(b.date))

        const plotData = [
          {
            x: data.map((d) => d.date),
            y: data.map((d) => d.clicks),
            type: "scatter",
            mode: "lines",
            line: { color: metricConfig.color, width: 2 },
          },
        ]

        const layout = {
          title: {
            text: metricConfig.label,
            font: {
              family: "'IBM Plex Mono', monospace",
              size: 11,
              color: "#666",
            },
            x: 0,
            xanchor: "left",
          },
          xaxis: {
            type: "date",
            tickangle: 0,
            dtick: "M3",
            tickformat: "%b %Y",
            gridcolor: "#f0f0f0",
            linecolor: "#f0f0f0",
            tickfont: {
              family: "'DM Sans', sans-serif",
              size: 9,
              color: "#999",
            },
            zeroline: false,
          },
          yaxis: {
            gridcolor: "#f0f0f0",
            linecolor: "#f0f0f0",
            tickfont: {
              family: "'DM Sans', sans-serif",
              size: 9,
              color: "#999",
            },
            zeroline: false,
          },
          plot_bgcolor: "rgba(0,0,0,0)",
          paper_bgcolor: "rgba(0,0,0,0)",
          margin: { t: 50, r: 20, b: 40, l: 30 },
          autosize: true,
        }

        const config = {
          responsive: true,
          displayModeBar: false,
          staticPlot: true,
        }

        Plotly.newPlot(metricConfig.id, plotData, layout, config)
      }
    </script>
  </body>
</html>
