<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Test Helper</title>
    <link rel="icon" type="image/png" href="golden-cup.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        display: flex;
        flex-direction: column;
        background-color: #f1f5f9;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }

      .container {
        display: flex;
        flex: 1;
        flex-wrap: wrap;
        padding: 20px;
        gap: 20px;
      }

      .panel {
        flex: 1 1 300px;
        height: 100%;
        border: 1px solid #cbd5e1;
        position: relative;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1),
          0 2px 4px -2px rgb(0 0 0 / 0.1);
      }

      .panel-label {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 12px;
        z-index: 10;
        pointer-events: none;
      }

      .panel-close {
        position: absolute;
        top: 8px;
        right: 10px;
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        border: none;
        width: 22px;
        height: 22px;
        border-radius: 11px;
        font-size: 14px;
        line-height: 22px;
        cursor: pointer;
      }

      .panel-close:hover {
        background: rgba(0, 0, 0, 0.6);
      }

      .panel-close:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 2px;
      }

      .panel:nth-child(1) {
        background: #f8b400;
      }

      .panel:nth-child(2) {
        background: #34a853;
      }

      .panel:nth-child(3) {
        background: #4285f4;
      }

      .panel iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: none;
      }

      @media (max-width: 600px) {
        .container {
          flex-direction: column;
          flex-wrap: nowrap;
          padding: 10px;
          gap: 10px;
        }

        .panel {
          flex: 1;
          height: auto;
          min-height: 0;
        }
      }

      .controls {
        display: flex;
        gap: 8px;
        padding: 8px 12px;
        background: white;
        border-bottom: 1px solid #e2e8f0;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        flex-wrap: wrap;
        align-items: center;
      }

      .radio-group {
        display: flex;
        gap: 4px;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 2px;
      }

      .radio-group label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #1f2937;
        background: transparent;
        border: none;
        border-radius: 4px;
        padding: 4px 8px;
        margin: 0;
      }

      .radio-group input[type="radio"] {
        width: 14px;
        height: 14px;
        accent-color: #2563eb;
      }

      button {
        appearance: none;
        background: #f1f5f9;
        color: #0f172a;
        border: 1px solid #cbd5e1;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: background 120ms ease;
      }

      button:hover {
        background: #e2e8f0;
      }

      button:active {
        background: #cbd5e1;
      }

      button.active {
        background: #2563eb;
        color: white;
        border-color: #1d4ed8;
      }

      button:disabled {
        background: #f1f5f9;
        color: #475569;
        border-color: #e2e8f0;
        cursor: not-allowed;
      }

      button:focus-visible {
        outline: 2px solid #60a5fa;
        outline-offset: 1px;
      }

      label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: #1f2937;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 4px 8px;
      }

      input[type="checkbox"] {
        width: 14px;
        height: 14px;
        accent-color: #2563eb;
      }

      .hidden {
        display: none !important;
      }

      .stats {
        padding: 12px 16px 0;
        display: flex;
        justify-content: center;
      }

      .nchan-wait {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        color: #111827;
        font-size: 14px;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      }

      .nchan-spinner {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid #e5e7eb;
        border-top-color: #f8b400;
        animation: slow-spin 2.4s linear infinite;
      }

      @keyframes slow-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      h2 {
        text-align: center;
        color: #1e293b;
        margin-bottom: 8px;
      }
    </style>
    <script type="module">
      import { faker } from "https://cdn.jsdelivr.net/npm/@faker-js/faker@9.4.0/+esm";

      // State
      const playerNames = [];
      const p1Id = "player-1-" + faker.string.alphanumeric(4).toLowerCase();
      const p2Id = "player-2-" + faker.string.alphanumeric(4).toLowerCase();
      const p1Name = "Alice";
      const p2Name = "Bob";

      // DOM elements
      const panel1 = document.getElementById("panel1");
      const panel2 = document.getElementById("panel2");
      const panel3 = document.getElementById("panel3");
      const stats = document.getElementById("stats");
      const btnStart = document.getElementById("btn-start");
      const ruleTypeRadios = document.querySelectorAll(
        'input[name="ruleType"]',
      );

      function getGameUrl() {
        return new URL("/game", globalThis.location.origin);
      }

      // Lobby mode: create iframe with random name
      function createIframe(options = {}) {
        const userName = options.userName || faker.person.firstName();
        const playerId =
          options.playerId || faker.string.alphanumeric(8).toLowerCase();
        const iframe = document.createElement("iframe");
        const src = getGameUrl();
        src.searchParams.set("userName", userName);
        src.searchParams.set("playerId", playerId);
        iframe.src = src.toString();
        iframe.width = "100%";
        iframe.height = "100%";
        iframe.frameBorder = "0";
        iframe.allow = "microphone";
        return iframe;
      }

      // Rematch mode: create iframe contents with specific userId/userName and optional rematch param
      function createRematchIframe(userId, userName, rematchParam = null) {
        const fragment = document.createDocumentFragment();
        const label = document.createElement("div");
        label.className = "panel-label";
        label.textContent = `${userName} (${userId})`;
        fragment.appendChild(label);

        const iframe = document.createElement("iframe");
        const url = getGameUrl();
        url.searchParams.set("userId", userId);
        url.searchParams.set("userName", userName);
        if (rematchParam) {
          url.searchParams.set("rematch", JSON.stringify(rematchParam));
        }
        iframe.src = url.toString();
        iframe.width = "100%";
        iframe.height = "100%";
        iframe.frameBorder = "0";
        iframe.allow = "microphone";
        fragment.appendChild(iframe);
        return fragment;
      }

      function clearPanels() {
        // Clear panel1
        panel1.innerHTML = "";
        panel1.className = "panel";

        // Clear panel2
        panel2.innerHTML = "";
        panel2.className = "panel";

        // Clear panel3
        panel3.innerHTML = "";
        panel3.className = "panel hidden";
      }

      /*********************************
       * LOBBY MODE
       *********************************/
      const createPanels = (ruleType) => {
        playerNames[0] = faker.person.firstName();
        playerNames[1] = faker.person.firstName();
        panel1.appendChild(createIframe({ userName: playerNames[0] }));
        panel2.appendChild(createIframe({ userName: playerNames[1] }));
      };

      const hidePreGameUi = () => {
        stats?.classList.add("hidden");
      };

      const warmNchanStats = async () => {
        const url = "https://billiards-network.onrender.com/basic_status";
        try {
          await fetch(url, { mode: "cors" });
        } catch (error) {
          console.warn("Failed to warm nchan stats:", error);
        } finally {
          stats?.classList.add("hidden");
        }
      };

      const getSelectedRuleType = () => {
        for (const radio of ruleTypeRadios) {
          if (radio.checked) return radio.value;
        }
        return "nineball";
      };

      const startGame = async () => {
        const ruleType = getSelectedRuleType();
        hidePreGameUi();
        btnStart.disabled = true;
        click(0, `button[aria-label="Challenge ${getOpponentName(0)}"]`);
        await wait(2000);
        click(0, `button[aria-label="Play ${ruleType}"]`);
        await wait(2000);
        click(1, `button[aria-label="Accept challenge"]`);
      };

      btnStart?.addEventListener("click", () => startGame());

      warmNchanStats();

      /*********************************
       * REMATCH MODE
       *********************************/
      function startMutualRematch() {
        clearPanels();
        const ruleType = getSelectedRuleType();
        playerNames[0] = p1Name;
        playerNames[1] = p2Name;
        const scores = [
          { userId: p1Id, score: 2 },
          { userId: p2Id, score: 1 },
        ];

        const p1Rematch = {
          opponentId: p2Id,
          opponentName: p2Name,
          ruleType: ruleType,
          lastScores: scores,
          nextTurnId: p2Id,
        };

        const p2Rematch = {
          opponentId: p1Id,
          opponentName: p1Name,
          ruleType: ruleType,
          lastScores: scores,
          nextTurnId: p2Id,
        };

        panel1.appendChild(createRematchIframe(p1Id, p1Name, p1Rematch));
        panel2.appendChild(createRematchIframe(p2Id, p2Name, p2Rematch));
      }

      function startOneWayRematch() {
        clearPanels();
        const ruleType = getSelectedRuleType();
        playerNames[0] = p1Name;
        playerNames[1] = p2Name;
        const scores = [
          { userId: p1Id, score: 0 },
          { userId: p2Id, score: 3 },
        ];

        const p1Rematch = {
          opponentId: p2Id,
          opponentName: p2Name,
          ruleType: ruleType,
          lastScores: scores,
          nextTurnId: p1Id,
        };

        panel1.appendChild(createRematchIframe(p1Id, p1Name, p1Rematch));
        panel2.appendChild(createRematchIframe(p2Id, p2Name, null));
      }

      function startStandardLobby() {
        clearPanels();
        playerNames[0] = p1Name;
        playerNames[1] = p2Name;
        panel1.appendChild(createRematchIframe(p1Id, p1Name, null));
        panel2.appendChild(createRematchIframe(p2Id, p2Name, null));
      }

      document.getElementById("btn-mutual").onclick = startMutualRematch;
      document.getElementById("btn-oneway").onclick = startOneWayRematch;
      document.getElementById("btn-standard").onclick = startStandardLobby;

      // Start with standard lobby
      startStandardLobby();

      /*********************************
       * SHARED UTILS
       *********************************/
      const wait = (ms) => {
        console.log(`wait: ${ms}ms`);
        return new Promise((resolve) => setTimeout(resolve, ms));
      };

      function click(panelIndex, selector) {
        console.log(`click: panel=${panelIndex}, selector="${selector}"`);
        const panel = document.querySelectorAll(".panel")[panelIndex];
        const iframe = panel?.querySelector("iframe");
        if (!iframe) {
          console.error(`Panel ${panelIndex}: no iframe found`);
          return;
        }
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc) {
          console.error(`Panel ${panelIndex}: no document`);
          return;
        }
        const el = doc.querySelector(selector);
        if (!el) {
          console.error(
            `Panel ${panelIndex}: no element found for "${selector}"`,
          );
          return;
        }
        el.click();
        console.log(`Panel ${panelIndex}: clicked "${selector}"`);
      }

      function getOpponentName(panelIndex) {
        if (playerNames[1 - panelIndex]) {
          return playerNames[1 - panelIndex];
        }
        return panelIndex === 0 ? p2Name : p1Name;
      }
    </script>
  </head>

  <body>
    <div class="controls">
      <div class="radio-group">
        <label>
          <input type="radio" name="ruleType" value="nineball" checked />
          Nineball
        </label>
        <label>
          <input type="radio" name="ruleType" value="snooker" />
          Snooker
        </label>
        <label>
          <input type="radio" name="ruleType" value="threecushion" />
          3-Cushion
        </label>
      </div>
      <button id="btn-start">Start</button>
      <span style="flex: 1"></span>
      <button id="btn-standard">Standard</button>
      <button id="btn-oneway">One-way</button>
      <button id="btn-mutual">Mutual</button>
    </div>

    <div class="stats" id="stats">
      <output class="nchan-wait">
        <span class="nchan-spinner" aria-hidden="true"></span>
        <span>Waiting for render.com to start nchan server...</span>
      </output>
    </div>

    <div class="container">
      <div class="panel" id="panel1"></div>
      <div class="panel" id="panel2"></div>
      <div class="panel hidden" id="panel3"></div>
    </div>
  </body>
</html>
