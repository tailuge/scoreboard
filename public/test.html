<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>multiplayer test helper</title>
  <link rel="icon" type="image/png" href="golden-cup.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      display: flex;
      flex-direction: column;
      background-color: #f1f5f9;
    }

    .container {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
      padding: 20px;
      gap: 20px;
    }

    .panel {
      flex: 1 1 300px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #cbd5e1;
      position: relative;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 4px 6px -1px rgb(0 0 0 / 0.1),
        0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    .panel-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 11px;
      font-size: 14px;
      line-height: 22px;
      cursor: pointer;
    }

    .panel-close:hover {
      background: rgba(0, 0, 0, 0.6);
    }

    .panel-close:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    .panel:nth-child(1) {
      background: #f8b400;
    }

    .panel:nth-child(2) {
      background: #34a853;
    }

    .panel:nth-child(3) {
      background: #4285f4;
    }

    .panel iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
        flex-wrap: nowrap;
        padding: 10px;
        gap: 10px;
      }

      .panel {
        flex: 1;
        height: auto;
        min-height: 0;
      }
    }

    .controls {
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      background:
        radial-gradient(circle at top,
          rgba(37, 99, 235, 0.12),
          transparent 55%),
        linear-gradient(180deg, #f8fafc 0%, #ffffff 70%);
      border-bottom: 1px solid #e2e8f0;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .controls button {
      appearance: none;
      background: linear-gradient(180deg, #ffffff, #eef2ff);
      color: #0f172a;
      border: 1px solid #c7d2fe;
      padding: 10px 20px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow:
        0 8px 16px rgba(37, 99, 235, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition:
        transform 120ms ease,
        box-shadow 120ms ease,
        filter 120ms ease,
        background 120ms ease;
    }

    .controls button:hover {
      filter: brightness(1.02);
      transform: translateY(-1px);
      box-shadow:
        0 12px 20px rgba(37, 99, 235, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .controls button:active {
      transform: translateY(0);
      filter: brightness(0.98);
      box-shadow:
        0 6px 12px rgba(37, 99, 235, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .controls button:disabled {
      background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
      color: #475569;
      border-color: #e2e8f0;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .controls button:disabled:hover {
      filter: none;
      transform: none;
      box-shadow: none;
    }

    .controls button:focus-visible {
      outline: 3px solid #60a5fa;
      outline-offset: 2px;
    }

    .controls label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #1f2937;
      font-weight: 600;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 8px 12px;
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.06);
    }

    .controls input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #2563eb;
    }

    .stats {
      padding: 12px 16px 0;
      display: flex;
      justify-content: center;
    }

    .nchan-wait {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      color: #111827;
      font-size: 14px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
    }

    .nchan-spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #e5e7eb;
      border-top-color: #f8b400;
      animation: slow-spin 2.4s linear infinite;
    }

    @keyframes slow-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .hidden {
      display: none;
    }
  </style>
  <script type="module">
    import { faker } from "https://cdn.jsdelivr.net/npm/@faker-js/faker@9.4.0/+esm";

    function getGameUrl() {
      return new URL("/game", globalThis.location.origin);
    }

    // Function to create an iframe
    function createIframe(options = {}) {
      const userName = options.userName || faker.person.firstName();
      const playerId =
        options.playerId || faker.string.alphanumeric(8).toLowerCase();
      const iframe = document.createElement("iframe");
      const src = getGameUrl();
      src.searchParams.set("userName", userName);
      src.searchParams.set("playerId", playerId);
      iframe.src = src.toString();
      iframe.width = "100%";
      iframe.height = "100%";
      iframe.frameBorder = "0";
      return iframe;
    }

    const panel1 = document.getElementById("panel1");
    const panel2 = document.getElementById("panel2");
    const panel3 = document.getElementById("panel3");
    const controls = document.getElementById("controls");
    const stats = document.getElementById("stats");
    const spectatorToggle = document.getElementById("spectator-toggle");
    const buttonNineball = document.getElementById("button-nineball");
    const buttonSnooker = document.getElementById("button-snooker");
    const buttonThreecushion = document.getElementById("button-threecushion");

    // Store player names by panel index
    const playerNames = [];

    const createPanels = (ruleType, includeSpectator) => {
      playerNames[0] = faker.person.firstName();
      playerNames[1] = faker.person.firstName();
      // Panel 1: action=join
      panel1.appendChild(createIframe({ userName: playerNames[0] }));

      // Panel 2: action=join
      panel2.appendChild(createIframe({ userName: playerNames[1] }));

      // Panel 3: just a random name
      if (panel3 && includeSpectator) {
        panel3.appendChild(createIframe());
      } else if (panel3) {
        panel3.classList.add("hidden");
      }
    };

    const hidePreGameUi = () => {
      controls?.classList.add("hidden");
      stats?.classList.add("hidden");
    };

    const enableStartButtons = () => {
      if (buttonNineball) buttonNineball.disabled = false;
      if (buttonSnooker) buttonSnooker.disabled = false;
      if (buttonThreecushion) buttonThreecushion.disabled = false;
    };

    const warmNchanStats = async () => {
      const url = "https://billiards-network.onrender.com/basic_status";
      try {
        const response = await fetch(url, { mode: "cors" });
        if (response.ok || response.type === "opaque") {
          enableStartButtons();
          stats?.classList.add("hidden");
        }
      } catch (error) {
        // Ignore fetch failures; iframe load can still unlock buttons.
        console.warn("Failed to warm nchan stats:", error);
      }
    };

    /*********************************
    * 
    * Test sequence to initiaite game.
    * 
    *********************************/
    const startGame = async (ruleType) => {
      hidePreGameUi();
      createPanels(ruleType, spectatorToggle?.checked);
      await wait(3000);
      click(0, 'button[aria-label*="users online"]');
      await wait(2000);
      click(0, `button[aria-label="Challenge ${getOpponentName(0)}"]`);
      await wait(2000);
      click(0, `button[aria-label="Play ${ruleType}"]`);
      await wait(2000);
      click(1, `button[aria-label="Accept challenge"]`);
      //      Place ball
      //      Hit cue ball
      //      Concede
    };

    document
      .getElementById("button-nineball")
      ?.addEventListener("click", () => startGame("nineball"));
    document
      .getElementById("button-snooker")
      ?.addEventListener("click", () => startGame("snooker"));
    document
      .getElementById("button-threecushion")
      ?.addEventListener("click", () => startGame("threecushion"));

    warmNchanStats();

    // ===== High-level click helper for iframe automation =====
    const wait = (ms) => {
      console.log(`wait: ${ms}ms`);
      return new Promise((resolve) => setTimeout(resolve, ms));
    };

    function click(panelIndex, selector) {
      console.log(`click: panel=${panelIndex}, selector="${selector}"`);
      const panel = document.querySelectorAll(".panel")[panelIndex];
      const iframe = panel?.querySelector("iframe");
      if (!iframe) {
        console.error(`Panel ${panelIndex}: no iframe found`);
        return;
      }
      console.log(`Panel ${panelIndex}: iframe found, waiting for load...`);
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if (!doc) {
        console.error(`Panel ${panelIndex}: no document`);
        return;
      }
      const el = doc.querySelector(selector);
      if (!el) {
        console.error(
          `Panel ${panelIndex}: no element found for "${selector}"`,
        );
        return;
      }
      el.click();
      console.log(`Panel ${panelIndex}: clicked "${selector}"`);
    }

    // Get opponent's username from another panel
    function getOpponentName(panelIndex) {
      return playerNames[1-panelIndex];
    }

  </script>
</head>

<body>
  <div class="controls" id="controls">
    <button type="button" id="button-nineball" disabled>Nineball</button>
    <button type="button" id="button-snooker" disabled>Snooker</button>
    <button type="button" id="button-threecushion" disabled>
      Three Cushion
    </button>
    <label for="spectator-toggle">
      <input type="checkbox" id="spectator-toggle" />
      Spectator
    </label>
  </div>
  <div class="stats" id="stats">
    <output class="nchan-wait">
      <span class="nchan-spinner" aria-hidden="true"></span>
      <span>Waiting for render.com to start nchan server...</span>
    </output>
  </div>
  <div class="container">
    <div class="panel" id="panel1"></div>
    <div class="panel" id="panel2"></div>
    <div class="panel hidden" id="panel3"></div>
  </div>
</body>

</html>
